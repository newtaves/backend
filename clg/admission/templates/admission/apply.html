{% extends 'base.html' %}

{% block title %}Apply Now - UniPortal{% endblock %}

{% block content %}
<div style="max-width: 800px; margin: 0 auto;">
    <div class="card">
        <h2 style="margin-bottom: 2rem;">Student Admission Form</h2>
        <form method="post">
            {% csrf_token %}
            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group">
                    <label for="full_name">Full Name</label>
                    <input type="text" name="full_name" id="full_name" class="form-input" required placeholder="John Doe">
                </div>
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" name="email" id="email" class="form-input" required placeholder="john@example.com">
                </div>
            </div>

            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group">
                    <label for="phone">Mobile Number</label>
                    <input type="text" name="phone" id="phone" class="form-input" required placeholder="+1 234 567 890">
                </div>
                <div class="form-group">
                    <label for="marks">High School Marks (%)</label>
                    <input type="number" step="0.01" name="marks" id="marks" class="form-input" required placeholder="85.50">
                </div>
            </div>

            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1.5rem;">
                <div class="form-group">
                    <label for="department">Preferred Department</label>
                    <select name="department" id="department" class="form-input" required>
                        <option value="">Select Department</option>
                        {% for dept in departments %}
                            <option value="{{ dept.id }}">{{ dept.name }}</option>
                        {% endfor %}
                    </select>
                </div>
                <div class="form-group">
                    <label for="course">Preferred Course</label>
                    <select name="course" id="course" class="form-input" required>
                        <option value="">Select Course</option>
                        {% for course in courses %}
                            <option value="{{ course.id }}" data-dept="{{ course.department.id }}">{{ course.name }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <div style="margin-top: 2rem; border-top: 1px solid var(--border); padding-top: 2rem; text-align: right;">
                <button type="submit" class="btn btn-primary" style="padding: 0.75rem 3rem; font-size: 1.1rem;">Submit Application</button>
            </div>
        </form>
    </div>
</div>

<script>
    // Simple dynamic filtering for courses based on selected department
    const deptSelect = document.getElementById('department');
    const courseSelect = document.getElementById('course');
    const allCourses = Array.from(courseSelect.options);

    deptSelect.addEventListener('change', (e) => {
        const selectedDeptId = e.target.value;
        courseSelect.innerHTML = '<option value="">Select Course</option>';
        
        allCourses.forEach(option => {
            if (option.getAttribute('data-dept') === selectedDeptId || option.value === "") {
                courseSelect.add(option);
            }
        });
    });
</script>
{% endblock %}
