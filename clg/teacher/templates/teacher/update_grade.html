{% extends 'base.html' %}

{% block title %}Update Grade - UniPortal{% endblock %}

{% block content %}
<div style="max-width: 500px; margin: 4rem auto;">
    <div class="card">
        <h2 style="margin-bottom: 0.5rem;">Update Grade</h2>
        <p style="color: var(--text-sub); margin-bottom: 2rem;">
            Student: <strong>{{ enrollment.student.name }}</strong><br>
            Course: <strong>{{ enrollment.course.name }}</strong>
        </p>
        
        <form method="post">
            {% csrf_token %}
            <div class="form-group">
                <label for="marks">New Marks (%)</label>
                <input type="number" step="0.01" name="marks" id="marks" class="form-input" 
                       value="{{ enrollment.marks|default:'' }}" required min="0" max="100">
            </div>
            
            <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                <button type="submit" class="btn btn-primary" style="flex: 1;">Save Changes</button>
                <a href="{% url 'teacher:dashboard' %}" class="btn" style="flex: 1; text-align: center; border: 1px solid var(--border);">Cancel</a>
            </div>
        </form>
    </div>
</div>
{% endblock %}
