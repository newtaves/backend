<!DOCTYPE html>
<html>
    <head>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <title>University Portal</title>
</head>
<body class="bg-light">
    <nav class="navbar navbar-dark bg-primary mb-4">
        <div class="container border-bottom">
            <span class="navbar-brand mb-0 h1">Global University Admissions</span>
        </div>
    </nav>
    <div class="container text-center">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-success">{{ message }}</div>
        {% endfor %}
        {% endif %}
        <div class="p-5 mb-4 bg-white rounded-3 shadow-sm">
            <h1 class="display-5 fw-bold">Start Your Journey</h1>
            <p class="fs-4">Applications for the 2026 Academic Year are now open.</p>
            <a href="{% url 'apply' %}" class="btn btn-primary btn-lg">Apply Now</a>
        </div>
    </div>
</body>
</html>
